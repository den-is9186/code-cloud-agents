# Capabilities Registry
# Jede Feature-Funktion wird hier registriert mit Test-Anforderungen

schema_version: "2.0"
project: "code-cloud-agents"
updated: "2026-01-26"

# ═══════════════════════════════════════════════════════════════
# MULTI-AGENT SYSTEM CAPABILITIES (NEU)
# ═══════════════════════════════════════════════════════════════

multi_agent_system:

  # ──────────────────────────────────────────────────────────────
  # Team Management
  # ──────────────────────────────────────────────────────────────

  - id: "team-management"
    name: "Team Management"
    description: "Create, configure, and manage agent teams"
    mode: "HTTP"
    criticality: "HIGH"
    status: "planned"
    endpoints:
      - "GET /api/teams"
      - "POST /api/teams"
      - "GET /api/teams/:id"
      - "PUT /api/teams/:id"
      - "DELETE /api/teams/:id"
    tests_required:
      - type: "unit"
        name: "team_create_validation"
        description: "Validate team creation input (name, repo, preset, task)"
      - type: "http"
        name: "team_create_201"
        description: "POST /api/teams returns 201 Created with team object"
      - type: "http"
        name: "team_list_200"
        description: "GET /api/teams returns 200 with team array"
      - type: "http"
        name: "team_get_200"
        description: "GET /api/teams/:id returns 200 with team details"
      - type: "http"
        name: "team_update_200"
        description: "PUT /api/teams/:id updates and returns 200"
      - type: "http"
        name: "team_delete_204"
        description: "DELETE /api/teams/:id returns 204 No Content"
      - type: "integration"
        name: "team_crud_flow"
        description: "Full CRUD flow: Create → Read → Update → Delete"

  # ──────────────────────────────────────────────────────────────
  # Workflow Control
  # ──────────────────────────────────────────────────────────────

  - id: "workflow-control"
    name: "Workflow Control"
    description: "Control build workflow with approval gates (Prototype → Approval → Premium)"
    mode: "HTTP"
    criticality: "CRITICAL"
    status: "planned"
    endpoints:
      - "GET /api/teams/:id/status"
      - "POST /api/teams/:id/approve"
      - "POST /api/teams/:id/reject"
      - "POST /api/teams/:id/partial"
      - "POST /api/teams/:id/skip-premium"
    tests_required:
      - type: "unit"
        name: "workflow_state_machine"
        description: "Test state transitions: TEAM_CREATED → PROTOTYPE_RUNNING → AWAITING_APPROVAL → PREMIUM_RUNNING → COMPLETED"
      - type: "unit"
        name: "workflow_state_validation"
        description: "Validate illegal transitions (e.g., COMPLETED → PROTOTYPE_RUNNING)"
      - type: "http"
        name: "status_200"
        description: "GET /api/teams/:id/status returns 200 with workflow state"
      - type: "http"
        name: "approve_triggers_premium"
        description: "POST /api/teams/:id/approve triggers premium build (Preset C)"
      - type: "http"
        name: "reject_restarts_prototype"
        description: "POST /api/teams/:id/reject restarts prototype with new requirements"
      - type: "http"
        name: "partial_adjusts_prototype"
        description: "POST /api/teams/:id/partial adjusts and re-runs prototype"
      - type: "http"
        name: "skip_completes_workflow"
        description: "POST /api/teams/:id/skip-premium marks workflow as completed"
      - type: "integration"
        name: "full_workflow_flow"
        description: "Full flow: Create Team → Prototype → Approval → Premium → Completed"

  # ──────────────────────────────────────────────────────────────
  # Preset Configuration
  # ──────────────────────────────────────────────────────────────

  - id: "preset-configuration"
    name: "Preset Configuration"
    description: "Configure team presets (A/B/C/D) and individual agent models"
    mode: "HTTP"
    criticality: "HIGH"
    status: "planned"
    endpoints:
      - "GET /api/teams/:id/preset"
      - "PUT /api/teams/:id/preset"
      - "GET /api/teams/:id/agents"
      - "PUT /api/teams/:id/agents/:agent"
    config_files:
      - "config/presets.yml"
      - "config/models.yml"
    tests_required:
      - type: "unit"
        name: "preset_validation"
        description: "Validate preset values (A, B, C, D, custom)"
      - type: "unit"
        name: "load_presets_yml"
        description: "Load and parse config/presets.yml correctly"
      - type: "unit"
        name: "load_models_yml"
        description: "Load and parse config/models.yml correctly"
      - type: "http"
        name: "preset_get_200"
        description: "GET /api/teams/:id/preset returns current preset config"
      - type: "http"
        name: "preset_change_200"
        description: "PUT /api/teams/:id/preset changes preset and returns updated config"
      - type: "http"
        name: "agents_get_200"
        description: "GET /api/teams/:id/agents returns all 7 agent configs"
      - type: "http"
        name: "agent_update_200"
        description: "PUT /api/teams/:id/agents/:agent updates single agent model"
      - type: "integration"
        name: "custom_agent_config"
        description: "Set preset to 'custom' and configure individual agents"

  # ──────────────────────────────────────────────────────────────
  # Build Management
  # ──────────────────────────────────────────────────────────────

  - id: "build-management"
    name: "Build Management"
    description: "Track and manage builds, logs, and costs"
    mode: "HTTP"
    criticality: "HIGH"
    status: "planned"
    endpoints:
      - "GET /api/teams/:id/builds"
      - "GET /api/teams/:id/builds/:buildId"
      - "GET /api/teams/:id/builds/:buildId/logs"
      - "GET /api/teams/:id/builds/:buildId/cost"
    tests_required:
      - type: "http"
        name: "build_list_200"
        description: "GET /api/teams/:id/builds returns all builds for team"
      - type: "http"
        name: "build_get_200"
        description: "GET /api/teams/:id/builds/:buildId returns build details"
      - type: "http"
        name: "build_logs_stream"
        description: "GET /api/teams/:id/builds/:buildId/logs streams logs (SSE/WebSocket)"
      - type: "http"
        name: "build_cost_200"
        description: "GET /api/teams/:id/builds/:buildId/cost returns cost breakdown"
      - type: "unit"
        name: "cost_calculation"
        description: "Calculate total cost from agent runs (tokens × cost_per_1m)"
      - type: "integration"
        name: "build_tracking_flow"
        description: "Create build → Track agent runs → Calculate cost → Return details"

  # ──────────────────────────────────────────────────────────────
  # Agent Orchestration
  # ──────────────────────────────────────────────────────────────

  - id: "agent-orchestration"
    name: "Agent Orchestration"
    description: "Orchestrate sequential agent execution (Supervisor → Architect → Coach → Code → Review → Test → Docs)"
    mode: "INTERNAL"
    criticality: "CRITICAL"
    status: "planned"
    tests_required:
      - type: "unit"
        name: "agent_sequence"
        description: "Validate correct agent execution order"
      - type: "unit"
        name: "agent_error_handling"
        description: "Handle agent failures gracefully (retry, fallback, skip)"
      - type: "unit"
        name: "agent_timeout"
        description: "Timeout agents that run too long"
      - type: "unit"
        name: "agent_fallback"
        description: "Use fallback model if primary agent fails"
      - type: "integration"
        name: "full_agent_flow"
        description: "Execute full agent sequence and produce valid result"
      - type: "integration"
        name: "agent_run_tracking"
        description: "Track tokens, cost, and status for each agent run"

  # ──────────────────────────────────────────────────────────────
  # Cost Tracking
  # ──────────────────────────────────────────────────────────────

  - id: "cost-tracking"
    name: "Cost Tracking & Budget Alerts"
    description: "Track costs per build, team, and user with budget alerts"
    mode: "INTERNAL"
    criticality: "HIGH"
    status: "implemented"
    functions:
      calculateModelCost:
        description: "Calculate cost for a model based on token usage"
        test: "tests/cost-tracker.test.js"
      calculateAgentCost:
        description: "Calculate cost for an agent run"
        test: "tests/cost-tracker.test.js"
      calculateBuildCost:
        description: "Calculate total cost for a build by summing all agent runs"
        test: "tests/cost-tracker.test.js"
      checkBudget:
        description: "Check if build is approaching or exceeding budget"
        test: "tests/cost-tracker.test.js"
      getBuildBudgetStatus:
        description: "Get budget status for a build"
        test: "tests/cost-tracker.test.js"
      estimatePresetCost:
        description: "Estimate cost for a preset based on average token usage"
        test: "tests/cost-tracker.test.js"
      comparePresetCosts:
        description: "Compare costs between multiple presets"
        test: "tests/cost-tracker.test.js"
      generateBuildCostReport:
        description: "Generate detailed cost report for a build"
        test: "tests/cost-tracker.test.js"
    tests_required:
      - type: "unit"
        name: "calculate_agent_cost"
        description: "Calculate cost from tokens: (input_tokens × input_cost + output_tokens × output_cost) / 1M"
      - type: "unit"
        name: "calculate_build_cost"
        description: "Sum all agent costs in a build"
      - type: "unit"
        name: "calculate_team_cost"
        description: "Sum all builds for a team"
      - type: "unit"
        name: "budget_alert_trigger"
        description: "Trigger alert when 80% of budget reached"
      - type: "integration"
        name: "cost_tracking_flow"
        description: "Track costs throughout build and update database"

  # ──────────────────────────────────────────────────────────────
  # Preset Configuration
  # ──────────────────────────────────────────────────────────────

  - id: "preset-functions"
    name: "Preset Configuration Functions"
    description: "Functions for loading and managing preset configurations"
    mode: "INTERNAL"
    criticality: "HIGH"
    status: "implemented"
    functions:
      loadConfig:
        description: "Load both presets and models configuration"
        test: "tests/presets.test.js"
      loadPresetsYAML:
        description: "Load presets configuration from YAML"
        test: "tests/presets.test.js"
      loadModelsYAML:
        description: "Load models configuration from YAML"
        test: "tests/presets.test.js"
      clearCache:
        description: "Clear configuration cache"
        test: "tests/presets.test.js"
      getAllPresets:
        description: "Get all available presets"
        test: "tests/presets.test.js"
      getPreset:
        description: "Get a specific preset by ID"
        test: "tests/presets.test.js"
      presetExists:
        description: "Check if a preset exists"
        test: "tests/presets.test.js"
      getStandardPresets:
        description: "Get all standard presets (A, B, C, D)"
        test: "tests/presets.test.js"
      getSpecialPresets:
        description: "Get special presets (V, L, LOCAL, etc.)"
        test: "tests/presets.test.js"
      getRecommendedPreset:
        description: "Get recommended preset"
        test: "tests/presets.test.js"
      getSelectionGuide:
        description: "Get preset selection guide"
        test: "tests/presets.test.js"
      getTwoPhaseWorkflow:
        description: "Get two-phase workflow configuration"
        test: "tests/presets.test.js"
      getAllModels:
        description: "Get all available models"
        test: "tests/presets.test.js"
      getModel:
        description: "Get a specific model by ID"
        test: "tests/presets.test.js"
      modelExists:
        description: "Check if a model exists"
        test: "tests/presets.test.js"
      getModelsByTier:
        description: "Get models by tier"
        test: "tests/presets.test.js"
      getModelSelectionGuide:
        description: "Get model selection guide"
        test: "tests/presets.test.js"
      getPricingComparison:
        description: "Get pricing comparison"
        test: "tests/presets.test.js"
      validatePreset:
        description: "Validate preset configuration"
        test: "tests/presets.test.js"
      validateModel:
        description: "Validate model configuration"
        test: "tests/presets.test.js"
      validateAllPresets:
        description: "Validate all presets"
        test: "tests/presets.test.js"
      validateAllModels:
        description: "Validate all models"
        test: "tests/presets.test.js"
      calculateModelCost:
        description: "Calculate cost for a model (from presets.js)"
        test: "tests/presets.test.js"
      getPresetEstimatedCost:
        description: "Get estimated cost for a preset"
        test: "tests/presets.test.js"
      comparePresetCosts:
        description: "Compare costs between presets (from presets.js)"
        test: "tests/presets.test.js"
      getPresetForUseCase:
        description: "Get preset for use case"
        test: "tests/presets.test.js"
      getPresetsByPriority:
        description: "Get presets by priority"
        test: "tests/presets.test.js"
      getPresetModels:
        description: "Get all agent models for a preset"
        test: "tests/presets.test.js"
      getValidPresetIds:
        description: "Get list of valid preset IDs"
        test: "tests/presets.test.js"
      getValidModelIds:
        description: "Get list of valid model IDs"
        test: "tests/presets.test.js"

  # ──────────────────────────────────────────────────────────────
  # Authentication Middleware
  # ──────────────────────────────────────────────────────────────

  - id: "auth-middleware"
    name: "Authentication Middleware"
    description: "Middleware for authentication and authorization"
    mode: "MIDDLEWARE"
    criticality: "HIGH"
    status: "implemented"
    functions:
      authenticate:
        description: "Verify JWT token or API key and attach user info to request"
        test: "tests/auth.test.js"
      requireRole:
        description: "Check if authenticated user has required role"
        test: "tests/auth.test.js"
      requireTeamOwnership:
        description: "Check if user owns the team or is admin/manager"
        test: "tests/auth.test.js"

  # ──────────────────────────────────────────────────────────────
  # CSRF Protection
  # ──────────────────────────────────────────────────────────────

  - id: "csrf-middleware"
    name: "CSRF Protection Middleware"
    description: "Cross-Site Request Forgery protection"
    mode: "MIDDLEWARE"
    criticality: "HIGH"
    status: "implemented"
    functions:
      csrfProtection:
        description: "CSRF protection middleware using Double Submit Cookie pattern"
        test: "tests/cors-csrf.test.js"
      getCsrfTokenEndpoint:
        description: "Endpoint to get CSRF token"
        test: "tests/cors-csrf.test.js"
      generateCsrfToken:
        description: "Generate a secure CSRF token"
        test: "tests/cors-csrf.test.js"
      verifyCsrfToken:
        description: "Verify CSRF token"
        test: "tests/cors-csrf.test.js"
      getSecureCookieOptions:
        description: "Get secure cookie configuration"
        test: "tests/cors-csrf.test.js"

  # ──────────────────────────────────────────────────────────────
  # Authentication Service
  # ──────────────────────────────────────────────────────────────

  - id: "auth-service"
    name: "Authentication Service"
    description: "JWT-based authentication with RBAC"
    mode: "SERVICE"
    criticality: "HIGH"
    status: "implemented"
    functions:
      hashPassword:
        description: "Hash password using PBKDF2"
        test: "tests/auth-service.test.js"
      verifyPassword:
        description: "Verify password against hash"
        test: "tests/auth-service.test.js"
      generateToken:
        description: "Generate JWT token"
        test: "tests/auth-service.test.js"
      verifyToken:
        description: "Verify and decode JWT token"
        test: "tests/auth-service.test.js"
      createUser:
        description: "Create a new user"
        test: "tests/auth-service.test.js"
      authenticateUser:
        description: "Authenticate user with email and password"
        test: "tests/auth-service.test.js"
      refreshAccessToken:
        description: "Refresh access token using refresh token"
        test: "tests/auth-service.test.js"
      revokeRefreshToken:
        description: "Revoke refresh token (logout)"
        test: "tests/auth-service.test.js"
      createApiKey:
        description: "Create API key for service-to-service authentication"
        test: "tests/auth-service.test.js"
      verifyApiKey:
        description: "Verify API key"
        test: "tests/auth-service.test.js"
      hasRole:
        description: "Check if user has required role"
        test: "tests/auth-service.test.js"
      hasPermission:
        description: "Check if user has required permission"
        test: "tests/auth-service.test.js"

  # ──────────────────────────────────────────────────────────────
  # Build Tracker Service
  # ──────────────────────────────────────────────────────────────

  - id: "build-tracker-service"
    name: "Build Tracker Service"
    description: "Manages build lifecycle and tracking"
    mode: "SERVICE"
    criticality: "HIGH"
    status: "implemented"
    functions:
      startBuild:
        description: "Start a new build for a team"
        test: "tests/build-tracker.test.js"
      markBuildRunning:
        description: "Mark a build as running"
        test: "tests/build-tracker.test.js"
      completeBuild:
        description: "Mark a build as completed"
        test: "tests/build-tracker.test.js"
      failBuild:
        description: "Mark a build as failed"
        test: "tests/build-tracker.test.js"
      startAgentRun:
        description: "Start an agent run within a build"
        test: "tests/build-tracker.test.js"
      completeAgentRun:
        description: "Complete an agent run with results"
        test: "tests/build-tracker.test.js"
      failAgentRun:
        description: "Fail an agent run"
        test: "tests/build-tracker.test.js"
      getBuildStatus:
        description: "Get build status with detailed information"
        test: "tests/build-tracker.test.js"
      getTeamBuildHistory:
        description: "Get all builds for a team"
        test: "tests/build-tracker.test.js"
      getLatestTeamBuild:
        description: "Get the latest build for a team"
        test: "tests/build-tracker.test.js"
      getBuildStatistics:
        description: "Get comprehensive build statistics"
        test: "tests/build-tracker.test.js"

# ═══════════════════════════════════════════════════════════════
# DASHBOARD & UI CAPABILITIES (NEU)
# ═══════════════════════════════════════════════════════════════

dashboard_ui:

  - id: "team-dashboard"
    name: "Team Dashboard UI"
    description: "Display all teams with status, costs, and actions"
    mode: "UI"
    criticality: "HIGH"
    status: "planned"
    components:
      - "TeamList"
      - "TeamCard"
      - "CreateTeamButton"
    tests_required:
      - type: "e2e"
        name: "dashboard_loads"
        description: "Dashboard loads and displays teams"
      - type: "e2e"
        name: "create_team_button"
        description: "Click 'Create Team' opens dialog"
      - type: "e2e"
        name: "team_status_display"
        description: "Team status (AWAITING_APPROVAL, etc.) displayed correctly"

  - id: "team-settings"
    name: "Team Settings UI"
    description: "Configure preset, agents, and view cost estimates"
    mode: "UI"
    criticality: "MEDIUM"
    status: "planned"
    components:
      - "TeamSettings"
      - "PresetSelector"
      - "AgentConfigurator"
      - "CostEstimate"
    tests_required:
      - type: "e2e"
        name: "preset_selection"
        description: "User can select preset A/B/C/D"
      - type: "e2e"
        name: "custom_agent_config"
        description: "User can configure individual agents"
      - type: "e2e"
        name: "cost_estimate_updates"
        description: "Cost estimate updates when preset changes"

  - id: "approval-dialog"
    name: "Approval Dialog UI"
    description: "Review prototype and approve/reject/partial/skip"
    mode: "UI"
    criticality: "HIGH"
    status: "planned"
    components:
      - "ApprovalDialog"
      - "PrototypeResults"
      - "ActionButtons"
    tests_required:
      - type: "e2e"
        name: "approval_dialog_opens"
        description: "Dialog opens when prototype is AWAITING_APPROVAL"
      - type: "e2e"
        name: "approve_triggers_premium"
        description: "Click 'Approve' triggers premium build"
      - type: "e2e"
        name: "reject_restarts"
        description: "Click 'Reject' restarts prototype with new requirements"

  - id: "build-progress"
    name: "Build Progress UI"
    description: "Live progress bar, agent status, and log stream"
    mode: "UI"
    criticality: "MEDIUM"
    status: "planned"
    components:
      - "BuildProgress"
      - "ProgressBar"
      - "AgentStatusList"
      - "LogStream"
    tests_required:
      - type: "e2e"
        name: "progress_bar_updates"
        description: "Progress bar updates as agents complete"
      - type: "e2e"
        name: "log_stream_works"
        description: "Logs stream in real-time via WebSocket/SSE"

  - id: "build-details"
    name: "Build Details UI"
    description: "View files changed, test results, PR link, and cost breakdown"
    mode: "UI"
    criticality: "LOW"
    status: "planned"
    components:
      - "BuildDetails"
      - "FileChanges"
      - "TestResults"
      - "CostBreakdown"
    tests_required:
      - type: "e2e"
        name: "build_details_display"
        description: "Build details page displays correctly"
      - type: "e2e"
        name: "pr_link_opens"
        description: "PR link opens in new tab"

# ═══════════════════════════════════════════════════════════════
# ORIGINAL CAPABILITIES (Behalten)
# ═══════════════════════════════════════════════════════════════

original_features:

  - id: "auto-build-workflow"
    name: "Auto Build Workflow"
    description: "GitHub Actions Workflow für autonome Code-Generation"
    status: "implemented"
    tests_required:
      - type: "integration"
        description: "Workflow triggered erfolgreich"
      - type: "integration"
        description: "Aider führt Task aus"
      - type: "integration"
        description: "Code wird committed und gepusht"

  - id: "task-input"
    name: "Task Input via Workflow Dispatch"
    description: "User kann Tasks via GitHub UI eingeben"
    status: "implemented"
    tests_required:
      - type: "integration"
        description: "Task wird korrekt an Aider übergeben"
      - type: "validation"
        description: "Leere Tasks werden abgelehnt"

  - id: "aider-integration"
    name: "Aider AI Integration"
    description: "Aider mit Claude Sonnet 4 konfiguriert"
    status: "implemented"
    tests_required:
      - type: "unit"
        description: "API Key wird korrekt geladen"
      - type: "integration"
        description: "Aider kann mit API kommunizieren"

  - id: "error-handling"
    name: "Build Error Handling"
    description: "Fehler werden geloggt und gemeldet"
    status: "implemented"
    tests_required:
      - type: "unit"
        description: "API-Fehler werden caught"
      - type: "integration"
        description: "Workflow schlägt graceful fehl bei Fehlern"

  - id: "global-error-handlers"
    name: "Global Error Handlers"
    description: "Process-level error handlers for unhandled rejections, uncaught exceptions, and graceful shutdown"
    status: "implemented"
    tests_required:
      - type: "unit"
        name: "unhandled_rejection_handler"
        description: "Handles unhandled promise rejections with logging"
      - type: "unit"
        name: "uncaught_exception_handler"
        description: "Handles uncaught exceptions with graceful shutdown"
      - type: "unit"
        name: "process_warning_handler"
        description: "Handles process warnings with logging"
      - type: "unit"
        name: "graceful_shutdown"
        description: "Graceful shutdown on SIGTERM/SIGINT"
      - type: "unit"
        name: "exception_monitor"
        description: "Monitor exceptions before crash for metrics"

  - id: "rate-limiting"
    name: "Distributed Rate Limiting"
    description: "Redis-backed rate limiting for multi-instance deployments with tiered limits"
    status: "implemented"
    tests_required:
      - type: "unit"
        name: "createRateLimiter"
        description: "Create Redis-backed rate limiter with configurable window and max requests"
      - type: "unit"
        name: "createGlobalRateLimiter"
        description: "Create tiered global rate limiter (10/100/1000 req/min based on auth)"
      - type: "unit"
        name: "createTeamRateLimiter"
        description: "Create per-team rate limiter (1000 req/hour per team)"
      - type: "unit"
        name: "createStrictRateLimiter"
        description: "Create strict rate limiter for auth endpoints (5 req/15min)"
      - type: "unit"
