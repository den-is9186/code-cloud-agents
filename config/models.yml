# ═══════════════════════════════════════════════════════════════
# NICHT VERWENDETE MODELLE (Dokumentation)
# ═══════════════════════════════════════════════════════════════

deprecated_models:

  qwen3-480b:
    reason: "Schwer verfügbar, 10x teurer als DeepSeek, Overkill"
    alternative: "deepseek-v3.2"

  gpt-4o:
    reason: "Teurer, nicht besser als DeepSeek für Coding"
    alternative: "deepseek-v3.2 oder claude-sonnet-4.5"

  codex:
    reason: "Veraltet (2021)"
    alternative: "deepseek-v3.2"

# ═══════════════════════════════════════════════════════════════
# PROVIDER KONFIGURATION
# ═══════════════════════════════════════════════════════════════

providers:

  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    auth_header: "Authorization"
    auth_prefix: "Bearer"
    env_var: "OPENROUTER_API_KEY"
    rate_limit:
      requests_per_minute: 60
      tokens_per_minute: 100000

  anthropic:
    base_url: "https://api.anthropic.com/v1"
    auth_header: "x-api-key"
    auth_prefix: ""
    env_var: "ANTHROPIC_API_KEY"
    rate_limit:
      requests_per_minute: 50
      tokens_per_minute: 100000

# ═══════════════════════════════════════════════════════════════
# MODELL-EMPFEHLUNGEN PRO AGENT-ROLLE
# ═══════════════════════════════════════════════════════════════

agent_model_recommendations:

  supervisor:
    budget: deepseek-v3.2
    standard: claude-haiku-4
    premium: claude-sonnet-4.5
    reason: "Muss schnell sein, einfache Routing-Aufgaben"

  architect:
    budget: deepseek-r1
    standard: deepseek-r1
    premium: claude-opus-4
    reason: "Braucht Reasoning für Architektur und Planung"

  coach:
    budget: deepseek-v3.2
    standard: deepseek-r1
    premium: deepseek-r1
    reason: "Muss Tasks strukturieren, R1 gut genug"

  code:
    budget: deepseek-v3.2
    standard: deepseek-v3.2
    premium: claude-sonnet-4.5
    reason: "Beste Coding-Benchmarks bei DeepSeek"

  review:
    budget: deepseek-v3.2
    standard: claude-sonnet-4.5
    premium: claude-opus-4
    reason: "Review braucht tiefe Analyse"

  test:
    budget: deepseek-v3.2
    standard: deepseek-v3.2
    premium: deepseek-r1
    reason: "Tests folgen Patterns, DeepSeek reicht"

  docs:
    budget: deepseek-v3.2
    standard: claude-haiku-4
    premium: claude-sonnet-4.5
    reason: "Haiku schreibt klare Sprache"

  refactor:
    budget: deepseek-r1
    standard: claude-sonnet-4.5
    premium: claude-opus-4
    reason: "Refactor braucht Kontext-Verständnis"

  merge:
    budget: deepseek-r1
    standard: claude-sonnet-4.5
    premium: claude-opus-4
    reason: "Merge braucht großen Kontext"

  multi_repo:
    budget: deepseek-r1
    standard: claude-sonnet-4.5
    premium: claude-opus-4
    reason: "Multi-Repo braucht sehr großen Kontext"

  tool_builder:
    budget: deepseek-v3.2
    standard: deepseek-r1
    premium: claude-opus-4
    reason: "Tool Builder braucht Architektur-Verständnis"

# ═══════════════════════════════════════════════════════════════
# FALLBACK KONFIGURATION
# ═══════════════════════════════════════════════════════════════

fallback_config:
  
  # Wenn primäres Modell fehlschlägt
  fallback_chain:
    claude-opus-4:
      - claude-sonnet-4.5
      - deepseek-r1
    claude-sonnet-4.5:
      - deepseek-r1
      - deepseek-v3.2
    claude-haiku-4:
      - deepseek-v3.2
    deepseek-r1:
      - deepseek-v3.2
      - claude-sonnet-4.5
    deepseek-v3.2:
      - deepseek-r1
      - claude-haiku-4
  
  # Retry-Konfiguration
  retry:
    max_attempts: 3
    backoff_ms: 1000
    backoff_multiplier: 2
