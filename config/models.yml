# MODELS CONFIGURATION
# Multi-Agent System - Verfügbare KI-Modelle

schema_version: "1.0"

# ═══════════════════════════════════════════════════════════════
# DEEPSEEK MODELLE (via OpenRouter)
# ═══════════════════════════════════════════════════════════════

models:

  deepseek-v3.2:
    display_name: "DeepSeek V3.2"
    provider: openrouter
    model_id: "deepseek/deepseek-chat"
    
    pricing:
      input_per_1m_tokens: 0.14
      output_per_1m_tokens: 0.28
      currency: "USD"
    
    capabilities:
      context_window: 128000
      max_output: 8192
      supports_streaming: true
      supports_functions: true
      supports_vision: false
    
    strengths:
      - "Beste Coding-Benchmarks (~75% LiveCodeBench)"
      - "Extrem günstig"
      - "Multi-Language Support"
      - "Wenig Halluzinationen"
    
    weaknesses:
      - "Kleinerer Kontext als Claude"
      - "Weniger gut bei sehr komplexem Reasoning"
    
    recommended_for:
      - code
      - test
      - docs
      - supervisor
    
    quality_scores:
      coding: 82
      reasoning: 70
      speed: 90
      cost_efficiency: 98

  deepseek-r1:
    display_name: "DeepSeek R1"
    provider: openrouter
    model_id: "deepseek/deepseek-reasoner"
    
    pricing:
      input_per_1m_tokens: 0.55
      output_per_1m_tokens: 2.19
      currency: "USD"
    
    capabilities:
      context_window: 128000
      max_output: 8192
      supports_streaming: true
      supports_functions: true
      supports_vision: false
    
    strengths:
      - "Top Reasoning (73% LiveCodeBench)"
      - "Perfekt für komplexe Planung"
      - "Baut autonome Agenten fehlerfrei"
      - "Gute Preis-Leistung"
    
    weaknesses:
      - "Langsamer als V3.2"
      - "Teurer als V3.2"
    
    recommended_for:
      - architect
      - coach
      - refactor
      - merge
    
    quality_scores:
      coding: 78
      reasoning: 90
      speed: 75
      cost_efficiency: 85

