# ═══════════════════════════════════════════════════════════════
# LOCAL SERVER SETUP GUIDE
# ═══════════════════════════════════════════════════════════════

local_server_setup:
  option_1_vllm:
    name: "vLLM (Empfohlen für Production)"
    install: |
      pip install vllm
      vllm serve meta-llama/Llama-4-Scout-Instruct \
        --host 0.0.0.0 \
        --port 8000 \
        --tensor-parallel-size 1 \
        --max-model-len 131072
    endpoint: "http://server:8000/v1"
    
  option_2_ollama:
    name: "Ollama (Einfachstes Setup)"
    install: |
      curl -fsSL https://ollama.com/install.sh | sh
      ollama pull llama4-scout:instruct
      ollama serve
    endpoint: "http://server:11434/v1"
    
  option_3_llamacpp:
    name: "llama.cpp (Beste Performance/VRAM)"
    install: |
      git clone https://github.com/ggerganov/llama.cpp
      cd llama.cpp && make -j
      ./server -m llama-4-scout-Q4_K_M.gguf \
        --host 0.0.0.0 --port 8000 \
        --ctx-size 131072
    endpoint: "http://server:8000/v1"

  env_config: |
    # In .env setzen:
    LOCAL_LLM_ENDPOINT=http://euer-server:8000
