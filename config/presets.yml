# PRESET SELECTION GUIDE
# ═══════════════════════════════════════════════════════════════

selection_guide:
  by_priority:
    cost: ["LOCAL", "A", "B+", "V", "L"]
    quality: ["C", "D", "B", "LOCAL"]
    speed: ["B+", "A"]
    vision: ["LOCAL", "V"]
    large_repos: ["L"]
    own_server: ["LOCAL"]
  
  by_use_case:
    prototype: "A"
    standard_dev: "B"
    standard_dev_with_server: "LOCAL"
    live_debugging: "B+"
    production: "C"
    cost_optimized_quality: "D"
    screenshot_to_code: "LOCAL"
    legacy_refactor: "L"
    code_cleanup: "E"
    merge_conflicts: "F"
    unlimited_docs: "LOCAL"
  
  decision_tree: |
    Hast du eigenen Server (24GB+ VRAM)?
      JA → LOCAL (beste Kosten/Qualität Balance)
      NEIN → Weiter...
    
    Ist es ein Prototyp?
      JA → A (Budget)
      NEIN → Weiter...
    
    Brauchst du Vision/Screenshots?
      JA → V (Vision)
      NEIN → Weiter...
    
    Ist es Production-kritisch?
      JA → C (Premium) oder D (Smart)
      NEIN → B (Optimal)

