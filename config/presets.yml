# ═══════════════════════════════════════════════════════════════
# DEFAULT WORKFLOW
# ═══════════════════════════════════════════════════════════════

default_workflow:
  name: "Prototype → Approval → Premium"
  description: "Erst günstig testen, dann perfektionieren"
  
  phases:
    prototype:
      preset: "A"
      auto_start: true
      
    approval:
      required: true
      timeout_hours: 72  # 3 Tage
      options:
        - action: approve
          description: "Prototyp gut → Premium starten"
          next_phase: premium
        - action: reject
          description: "Prototyp falsch → Neu beschreiben"
          next_phase: prototype
        - action: partial
          description: "Prototyp anpassen → Nochmal A"
          next_phase: prototype
        - action: skip
          description: "Prototyp reicht aus"
          next_phase: completed
    
    premium:
      preset: "C"
      auto_start: false  # Nur nach Approval

