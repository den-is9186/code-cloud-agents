          - "Test-Validierung nach Merge"
    
    use_cases:
      - "Feature Branch Merges"
      - "Komplexe Konflikte"
      - "Multi-Branch Integration"

# ═══════════════════════════════════════════════════════════════
# PRESET SELECTION GUIDE
# ═══════════════════════════════════════════════════════════════

selection_guide:
  by_priority:
    cost: ["A", "B+", "V", "L"]
    quality: ["C", "D", "B"]
    speed: ["B+", "A"]
    vision: ["V"]
    large_repos: ["L"]
  
  by_use_case:
    prototype: "A"
    standard_dev: "B"
    live_debugging: "B+"
    production: "C"
    cost_optimized_quality: "D"
    screenshot_to_code: "V"
    legacy_refactor: "L"
    code_cleanup: "E"
    merge_conflicts: "F"

