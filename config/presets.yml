# TWO-PHASE WORKFLOW
# ═══════════════════════════════════════════════════════════════

two_phase_workflow:
  description: "Erst Prototyp mit Budget, dann Premium nach Approval"
  
  phase_1:
    preset: "A"
    purpose: "Schneller Prototyp"
    cost: 8
    ends_with: "AWAITING_APPROVAL"
  
  phase_2:
    preset: "C"
    purpose: "Production-Ready polieren"
    cost: 130
    requires: "User Approval"
  
  total_cost: 138
  
  comparison:
    direct_premium_5_attempts: 650
    two_phase_workflow: 138
    savings_percent: 79

