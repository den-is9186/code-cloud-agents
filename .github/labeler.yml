# Labels basierend auf geänderten Dateien

# Backend / Source Code
backend:
  - changed-files:
      - any-glob-to-any-file: 'src/**/*'

# Tests
tests:
  - changed-files:
      - any-glob-to-any-file: 'tests/**/*'

# Documentation
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - '*.md'
          - 'docs/**/*'
          - 'wiki/**/*'

# Configuration
config:
  - changed-files:
      - any-glob-to-any-file:
          - '*.json'
          - '*.yml'
          - '*.yaml'
          - 'config/**/*'

# CI/CD
ci:
  - changed-files:
      - any-glob-to-any-file: '.github/**/*'

# Dependencies
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'package-lock.json'

# Contracts
contracts:
  - changed-files:
      - any-glob-to-any-file: 'CONTRACTS/**/*'
