name: Queue Processor

on:
  schedule:
    # Alle 2 Minuten - checkt Queue und startet Build wenn Tasks vorhanden
    - cron: '*/2 * * * *'

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Queue and Trigger Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Prüfe ob Queue Tasks hat
          if [ ! -f "task-queue.txt" ]; then
            echo "ℹ️  Keine Queue gefunden"
            exit 0
          fi

          TASKS=$(grep -v '^#' task-queue.txt | grep -v '^$' | wc -l | tr -d ' ')

          if [ "$TASKS" -eq 0 ]; then
            echo "ℹ️  Queue ist leer"
            exit 0
          fi

          echo "📋 $TASKS Tasks in Queue"

          # Prüfe ob bereits ein Build läuft
          RUNNING=$(gh run list --workflow=auto-build.yml --status=in_progress --json databaseId --jq '. | length')

          if [ "$RUNNING" -gt 0 ]; then
            echo "⏳ Build läuft bereits, warte..."
            exit 0
          fi

          # Hole erste Task
          TASK=$(grep -v '^#' task-queue.txt | grep -v '^$' | head -n 1)

          echo "🚀 Triggere Build für: $TASK"

          # Trigger Build
          gh workflow run auto-build.yml --ref main

          echo "✅ Build getriggert"
