name: Auto-Scan & Create Issues

on:
  schedule:
    # Täglich um 3:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      auto_fix:
        description: 'Add auto-fix label to created issues'
        required: false
        default: true
        type: boolean

jobs:
  scan:
    name: Scan for Problems
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # ═══════════════════════════════════════════════════════════
      # BUILD FIRST (required for tests)
      # ═══════════════════════════════════════════════════════════
      - name: Build Project
        id: build
        continue-on-error: true
        run: |
          npm run build 2>&1 | tee build-output.log
          BUILD_EXIT=$?

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "failed=true" >> $GITHUB_OUTPUT
            BUILD_ERRORS=$(grep "error TS" build-output.log | head -10 || echo "Build failed")
            echo "BUILD_ERRORS<<EOF" >> $GITHUB_ENV
            echo "$BUILD_ERRORS" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

      # ═══════════════════════════════════════════════════════════
      # TEST SCAN (only if build succeeded)
      # ═══════════════════════════════════════════════════════════
      - name: Run Tests
        id: tests
        if: steps.build.outputs.failed != 'true'
        continue-on-error: true
        run: |
          npm test 2>&1 | tee test-output.log || true

          # Count actual failures
          if grep -q "Test Suites:.*failed" test-output.log; then
            FAILED=$(grep "Test Suites:" test-output.log | grep -oE "[0-9]+ failed" | grep -oE "[0-9]+" || echo "0")
            FAILED_TESTS=$(grep -E "^FAIL" test-output.log | head -10 || echo "")
          else
            FAILED=0
            FAILED_TESTS=""
          fi

          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "FAILED_TESTS<<EOF" >> $GITHUB_ENV
          echo "$FAILED_TESTS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "📊 Failed test suites: $FAILED"

      # ═══════════════════════════════════════════════════════════
      # LINT SCAN (only count ERRORS, not warnings)
      # ═══════════════════════════════════════════════════════════
      - name: Run Lint Check
        id: lint
        continue-on-error: true
        run: |
          npm run lint 2>&1 | tee lint-output.log || true

          # Only count actual errors, NOT warnings
          ERRORS=$(grep -cE "\s+[0-9]+:[0-9]+\s+error\s+" lint-output.log || echo "0")
          WARNINGS=$(grep -cE "\s+[0-9]+:[0-9]+\s+warning\s+" lint-output.log || echo "0")

          # Only get error details (not warnings)
          LINT_ERRORS=$(grep -E "\s+[0-9]+:[0-9]+\s+error\s+" lint-output.log | head -20 || echo "")

          # Get affected files for errors only
          LINT_FILES=$(grep -B1 -E "\s+[0-9]+:[0-9]+\s+error\s+" lint-output.log | grep "^/" | sort -u | head -10 || echo "")

          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "warnings=$WARNINGS" >> $GITHUB_OUTPUT
          echo "LINT_ERRORS<<EOF" >> $GITHUB_ENV
          echo "$LINT_ERRORS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "LINT_FILES<<EOF" >> $GITHUB_ENV
          echo "$LINT_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "📊 Lint errors: $ERRORS (warnings: $WARNINGS - ignored)"

      # ═══════════════════════════════════════════════════════════
      # TYPE CHECK SCAN
      # ═══════════════════════════════════════════════════════════
      - name: Run Type Check
        id: typecheck
        continue-on-error: true
        run: |
          npm run type-check 2>&1 | tee typecheck-output.log || true

          ERRORS=$(grep -c "error TS" typecheck-output.log || echo "0")

          # Get specific errors with file names
          TYPE_ERRORS=$(grep "error TS" typecheck-output.log | head -10 || echo "")
          TYPE_FILES=$(grep "error TS" typecheck-output.log | grep -oE "^[^(]+" | sort -u | head -5 || echo "")

          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "TYPE_ERRORS<<EOF" >> $GITHUB_ENV
          echo "$TYPE_ERRORS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "TYPE_FILES<<EOF" >> $GITHUB_ENV
          echo "$TYPE_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "📊 Type errors: $ERRORS"

      # ═══════════════════════════════════════════════════════════
      # SECURITY SCAN (npm audit)
      # ═══════════════════════════════════════════════════════════
      - name: Run Security Audit
        id: security
        continue-on-error: true
        run: |
          npm audit --json 2>/dev/null | tee audit-output.json || true

          if [ -f audit-output.json ] && [ -s audit-output.json ]; then
            CRITICAL=$(cat audit-output.json | jq '.metadata.vulnerabilities.critical // 0' 2>/dev/null || echo "0")
            HIGH=$(cat audit-output.json | jq '.metadata.vulnerabilities.high // 0' 2>/dev/null || echo "0")
            TOTAL=$((CRITICAL + HIGH))

            # Get vulnerability names
            VULN_DETAILS=$(cat audit-output.json | jq -r '.vulnerabilities | to_entries[]? | select(.value.severity == "critical" or .value.severity == "high") | "- \(.key): \(.value.severity)"' 2>/dev/null | head -10 || echo "")
          else
            TOTAL=0
            VULN_DETAILS=""
          fi

          echo "issues=$TOTAL" >> $GITHUB_OUTPUT
          echo "VULN_DETAILS<<EOF" >> $GITHUB_ENV
          echo "$VULN_DETAILS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          echo "📊 Critical/High vulnerabilities: $TOTAL"

      # ═══════════════════════════════════════════════════════════
      # CREATE ISSUES (only for real problems)
      # ═══════════════════════════════════════════════════════════

      - name: Create Build Failure Issue
        if: steps.build.outputs.failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔨 Build Failure - TypeScript Compilation Error';
            const autoFix = '${{ github.event.inputs.auto_fix }}' !== 'false';

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'build-failure'
            });

            if (issues.data.find(i => i.title === title)) {
              console.log('Issue already exists');
              return;
            }

            const body = `## 🔨 Build fehlgeschlagen

**Scan-Datum:** ${new Date().toISOString()}

### TypeScript Compilation Errors
\`\`\`
${process.env.BUILD_ERRORS || 'Build failed - check logs'}
\`\`\`

### Fix
\`\`\`bash
npm run build
# Fix the TypeScript errors shown above
\`\`\`

---
_Automatisch erstellt von Auto-Scan Workflow_
`;

            const labels = ['build-failure', 'automated'];
            if (autoFix) labels.push('auto-fix');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });

      - name: Create Test Failure Issue
        if: steps.tests.outputs.failed != '0' && steps.tests.outputs.failed != ''
        uses: actions/github-script@v7
        with:
          script: |
            const failed = parseInt('${{ steps.tests.outputs.failed }}') || 0;
            if (failed === 0) return;

            const title = `🧪 ${failed} Test Suite(s) Failing`;
            const autoFix = '${{ github.event.inputs.auto_fix }}' !== 'false';

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure'
            });

            if (issues.data.find(i => i.title.includes('Test Suite'))) {
              console.log('Test failure issue already exists');
              return;
            }

            const body = `## 🧪 Test Failures

**Scan-Datum:** ${new Date().toISOString()}
**Fehlgeschlagene Test Suites:** ${failed}

### Betroffene Test-Dateien
\`\`\`
${process.env.FAILED_TESTS || 'Check npm test output'}
\`\`\`

### Reproduzieren
\`\`\`bash
npm test
\`\`\`

---
_Automatisch erstellt von Auto-Scan Workflow_
`;

            const labels = ['test-failure', 'automated'];
            if (autoFix) labels.push('auto-fix');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });

      - name: Create Lint Error Issue
        if: steps.lint.outputs.errors != '0' && steps.lint.outputs.errors != ''
        uses: actions/github-script@v7
        with:
          script: |
            const errors = parseInt('${{ steps.lint.outputs.errors }}') || 0;
            if (errors === 0) return;

            const title = `🔧 ${errors} ESLint Error(s) Found`;
            const autoFix = '${{ github.event.inputs.auto_fix }}' !== 'false';

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'lint-error'
            });

            if (issues.data.find(i => i.title.includes('ESLint Error'))) {
              console.log('Lint error issue already exists');
              return;
            }

            const body = `## 🔧 ESLint Errors (not warnings)

**Scan-Datum:** ${new Date().toISOString()}
**Anzahl Errors:** ${errors}

### Betroffene Dateien
\`\`\`
${process.env.LINT_FILES || 'N/A'}
\`\`\`

### Error Details
\`\`\`
${process.env.LINT_ERRORS || 'Run npm run lint for details'}
\`\`\`

### Fix
\`\`\`bash
npm run lint:fix
\`\`\`

---
_Automatisch erstellt von Auto-Scan Workflow_
`;

            const labels = ['lint-error', 'automated'];
            if (autoFix) labels.push('auto-fix');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });

      - name: Create Type Error Issue
        if: steps.typecheck.outputs.errors != '0' && steps.typecheck.outputs.errors != ''
        uses: actions/github-script@v7
        with:
          script: |
            const errors = parseInt('${{ steps.typecheck.outputs.errors }}') || 0;
            if (errors === 0) return;

            const title = `📘 ${errors} TypeScript Error(s) Found`;
            const autoFix = '${{ github.event.inputs.auto_fix }}' !== 'false';

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'type-error'
            });

            if (issues.data.find(i => i.title.includes('TypeScript Error'))) {
              console.log('Type error issue already exists');
              return;
            }

            const body = `## 📘 TypeScript Errors

**Scan-Datum:** ${new Date().toISOString()}
**Anzahl Errors:** ${errors}

### Betroffene Dateien
\`\`\`
${process.env.TYPE_FILES || 'N/A'}
\`\`\`

### Error Details
\`\`\`
${process.env.TYPE_ERRORS || 'Run npm run type-check for details'}
\`\`\`

### Fix
\`\`\`bash
npm run type-check
# Fix errors in the files listed above
\`\`\`

---
_Automatisch erstellt von Auto-Scan Workflow_
`;

            const labels = ['type-error', 'automated'];
            if (autoFix) labels.push('auto-fix');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });

      - name: Create Security Issue
        if: steps.security.outputs.issues != '0' && steps.security.outputs.issues != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issues = parseInt('${{ steps.security.outputs.issues }}') || 0;
            if (issues === 0) return;

            const title = `🔒 ${issues} Security Vulnerabilit${issues === 1 ? 'y' : 'ies'} (Critical/High)`;

            // Check if issue already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security'
            });

            if (existingIssues.data.find(i => i.title.includes('Security Vulnerabilit'))) {
              console.log('Security issue already exists');
              return;
            }

            const body = `## 🔒 Security Vulnerabilities

**Scan-Datum:** ${new Date().toISOString()}
**Critical/High Issues:** ${issues}

### Vulnerabilities
\`\`\`
${process.env.VULN_DETAILS || 'Run npm audit for details'}
\`\`\`

### Fix
\`\`\`bash
npm audit fix
# or manually update packages
\`\`\`

⚠️ **Security Issues sollten manuell geprüft werden!**

---
_Automatisch erstellt von Auto-Scan Workflow_
`;

            // Security issues should NOT auto-fix
            const labels = ['security', 'automated', 'critical'];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels
            });

      # ═══════════════════════════════════════════════════════════
      # SUMMARY
      # ═══════════════════════════════════════════════════════════
      - name: Summary
        if: always()
        run: |
          echo "### 🔍 Auto-Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result | Action |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.build.outputs.failed == 'true' && '❌ Failed' || '✅ Passed' }} | ${{ steps.build.outputs.failed == 'true' && 'Issue created' || '-' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.tests.outputs.failed || '0' }} failed | ${{ steps.tests.outputs.failed != '0' && steps.tests.outputs.failed != '' && 'Issue created' || '-' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Errors | ${{ steps.lint.outputs.errors || '0' }} | ${{ steps.lint.outputs.errors != '0' && steps.lint.outputs.errors != '' && 'Issue created' || '-' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint Warnings | ${{ steps.lint.outputs.warnings || '0' }} | Ignored (warnings only) |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Errors | ${{ steps.typecheck.outputs.errors || '0' }} | ${{ steps.typecheck.outputs.errors != '0' && steps.typecheck.outputs.errors != '' && 'Issue created' || '-' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security (Critical/High) | ${{ steps.security.outputs.issues || '0' }} | ${{ steps.security.outputs.issues != '0' && steps.security.outputs.issues != '' && 'Issue created' || '-' }} |" >> $GITHUB_STEP_SUMMARY
