name: Auto-Fix Issue

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to fix'
        required: true
        type: number

jobs:
  auto-fix:
    # Nur bei Label "auto-fix" oder manuellem Trigger
    if: github.event.label.name == 'auto-fix' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get Issue Details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.payload.issue?.number || ${{ github.event.inputs.issue_number || 0 }};

            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });

            console.log('Issue Title:', issue.data.title);
            console.log('Issue Body:', issue.data.body);

            // Sanitize für Shell
            const title = issue.data.title.replace(/[`$"\\]/g, '');
            const body = (issue.data.body || '').replace(/[`$"\\]/g, '').substring(0, 2000);

            core.setOutput('number', issueNumber);
            core.setOutput('title', title);
            core.setOutput('body', body);

            return { number: issueNumber, title, body };

      - name: Comment - Starting Fix
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              body: '🤖 **Auto-Fix gestartet**\n\nIch analysiere das Issue und versuche einen Fix zu erstellen...\n\n_Powered by aider + Claude_'
            });

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          pip install aider-chat
          npm ci

      - name: Configure Git
        run: |
          git config user.name "Auto-Fix Bot"
          git config user.email "auto-fix[bot]@users.noreply.github.com"

      - name: Create Fix Branch
        id: branch
        run: |
          BRANCH_NAME="auto-fix/issue-${{ steps.issue.outputs.number }}"
          git checkout -b "$BRANCH_NAME"
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Run aider to Fix Issue
        id: aider
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Task aus Issue erstellen
          TASK="Fix GitHub Issue #${{ steps.issue.outputs.number }}

          Title: ${{ steps.issue.outputs.title }}

          Description:
          ${{ steps.issue.outputs.body }}

          Instructions:
          1. Analyze the issue and understand what needs to be fixed
          2. Make the necessary code changes
          3. Ensure the fix is minimal and focused
          4. Add or update tests if applicable
          5. Do not break existing functionality"

          echo "📋 Task for aider:"
          echo "$TASK"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # aider ausführen
          aider \
            --yes \
            --auto-commits \
            --model claude-sonnet-4-5-20250929 \
            --message "$TASK" \
            2>&1 | tee aider-output.log || true

          # Prüfen ob Änderungen gemacht wurden
          if git diff --quiet HEAD~1 HEAD 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "⚠️ Keine Änderungen von aider"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Änderungen erkannt"
          fi

      - name: Push Changes
        if: steps.aider.outputs.has_changes == 'true'
        run: |
          git push origin "${{ steps.branch.outputs.name }}" --force

      - name: Create Pull Request
        if: steps.aider.outputs.has_changes == 'true'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 Auto-Fix: ${{ steps.issue.outputs.title }}`,
              head: '${{ steps.branch.outputs.name }}',
              base: 'main',
              body: `## 🤖 Automatischer Fix für Issue #${{ steps.issue.outputs.number }}

            **Issue:** #${{ steps.issue.outputs.number }}
            **Titel:** ${{ steps.issue.outputs.title }}

            ---

            ### Was wurde geändert
            Dieser PR wurde automatisch von aider + Claude generiert um das Issue zu fixen.

            ### Review Checklist
            - [ ] Code Review durchgeführt
            - [ ] Tests laufen durch
            - [ ] Änderungen sind korrekt

            ---

            > ⚠️ **Bitte reviewe diesen PR sorgfältig!** Auto-generierter Code sollte immer geprüft werden.

            Closes #${{ steps.issue.outputs.number }}
            `
            });

            console.log('PR created:', pr.data.html_url);
            core.setOutput('url', pr.data.html_url);
            core.setOutput('number', pr.data.number);

            // Labels hinzufügen
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['auto-fix', 'needs-review']
            });

            return pr.data;

      - name: Comment - PR Created
        if: steps.aider.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              body: `✅ **Auto-Fix abgeschlossen!**

            Ich habe einen Fix erstellt und einen Pull Request geöffnet:

            👉 ${{ steps.pr.outputs.url }}

            Bitte reviewe die Änderungen und merge den PR wenn alles passt.

            _Powered by aider + Claude_`
            });

      - name: Comment - No Changes
        if: steps.aider.outputs.has_changes != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.issue.outputs.number }},
              body: `⚠️ **Auto-Fix konnte keinen Fix erstellen**

            Mögliche Gründe:
            - Das Issue ist zu komplex für automatisches Fixen
            - Mehr Kontext oder Details werden benötigt
            - Der Fix erfordert manuelles Eingreifen

            Bitte beschreibe das Problem detaillierter oder fixe es manuell.

            _Powered by aider + Claude_`
            });

      - name: Summary
        if: always()
        run: |
          echo "### 🤖 Auto-Fix Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Issue:** #${{ steps.issue.outputs.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Title:** ${{ steps.issue.outputs.title }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changes Made:** ${{ steps.aider.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.aider.outputs.has_changes }}" == "true" ]; then
            echo "**PR:** ${{ steps.pr.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          fi
