name: Auto Build with Aider

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Build Task (natural language)'
        required: true
        type: string
      model:
        description: 'AI Model'
        required: false
        type: choice
        default: 'claude-sonnet-4-5-20250929'
        options:
          - claude-sonnet-4-5-20250929
          - claude-opus-4-5
          - gpt-4

  push:
    # Startet wenn task-queue.txt geändert wird
    branches:
      - main
    paths:
      - 'task-queue.txt'

  schedule:
    # Alle 15 Minuten (Fallback)
    - cron: '*/15 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "den-is9186"
          git config user.email "den-is9186@users.noreply.github.com"

      - name: Check Queue
        id: queue_check
        run: |
          # Prüfe ob Queue Tasks hat (außer bei manual trigger)
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            if [ ! -f "task-queue.txt" ]; then
              echo "ℹ️  Keine task-queue.txt gefunden"
              exit 0
            fi

            TASKS=$(grep -v '^#' task-queue.txt | grep -v '^$' | wc -l)
            if [ "$TASKS" -eq 0 ]; then
              echo "ℹ️  Queue ist leer, nichts zu tun"
              exit 0
            fi

            echo "📋 $TASKS Tasks in Queue"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Aider
        run: |
          pip install aider-chat
          aider --version

      - name: Run Auto-Build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Task festlegen
          if [ -n "${{ github.event.inputs.task }}" ]; then
            # Manuel getriggert
            TASK="${{ github.event.inputs.task }}"
          elif [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            # Auto-triggered: Hole Task aus Queue
            if [ ! -f "task-queue.txt" ]; then
              echo "ℹ️  Keine task-queue.txt gefunden"
              exit 0
            fi

            # Erste nicht-kommentierte Task holen
            TASK=$(grep -v '^#' task-queue.txt | grep -v '^$' | head -n 1)

            if [ -z "$TASK" ]; then
              echo "ℹ️  Queue ist leer, nichts zu tun"
              exit 0
            fi

            echo "📥 Task aus Queue geholt: $TASK"
          else
            TASK="Review code and suggest improvements"
          fi

          MODEL="${{ github.event.inputs.model || 'claude-sonnet-4-5-20250929' }}"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Auto-Build gestartet"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 Task: $TASK"
          echo "🤖 Model: $MODEL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Aider ausführen
          aider \
            --yes \
            --auto-commits \
            --model "$MODEL" \
            --message "$TASK" \
            || {
              echo "❌ Aider Build fehlgeschlagen"
              exit 1
            }

          echo "✅ Build abgeschlossen"

          # Bei auto-triggered build: Task aus Queue entfernen
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "push" ]; then
            echo "🗑️  Entferne Task aus Queue"
            # Erste nicht-kommentierte Zeile entfernen
            grep -v '^#' task-queue.txt | grep -v '^$' | tail -n +2 > task-queue.tmp
            grep '^#' task-queue.txt > task-queue.new
            cat task-queue.tmp >> task-queue.new
            mv task-queue.new task-queue.txt
            rm -f task-queue.tmp

            git add task-queue.txt
            git commit -m "chore: processed task from queue" || true
          fi

      - name: Push Changes
        run: |
          git pull --rebase origin main || true

          if git diff --quiet && git diff --cached --quiet; then
            echo "ℹ️  Keine Änderungen zu pushen"
          else
            git push origin main
            echo "✅ Änderungen gepusht"
          fi

      - name: Build Summary
        if: always()
        run: |
          echo "### 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Task:** ${{ github.event.inputs.task || 'Scheduled build' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Model:** ${{ github.event.inputs.model || 'claude-sonnet-4-5-20250929' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Commits seit letztem Build
          echo "**Recent Commits:**" >> $GITHUB_STEP_SUMMARY
          git log --oneline -5 >> $GITHUB_STEP_SUMMARY || echo "No commits" >> $GITHUB_STEP_SUMMARY
